<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aplikasi Kasir</title>
<style>
  :root{
    --bg:#f4f5f7;
    --panel:#ffffff;
    --border:#e2e4e9;
    --ink:#1a1d23;
    --muted:#767c88;
    --primary:#2563eb;
    --primary-dark:#1d4ed8;
    --primary-soft:#eaf1ff;
    --green:#15803d;
    --green-soft:#e7f6ec;
    --red:#dc2626;
    --red-soft:#fdecec;
    --amber:#b45309;
    --radius:12px;
    font-family:'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, Roboto, Arial, sans-serif;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    height:100vh;
    overflow:hidden;
  }
  .app{
    display:flex;
    flex-direction:column;
    height:100vh;
  }

  /* ---------- Top bar ---------- */
  .topbar{
    background:var(--panel);
    border-bottom:1px solid var(--border);
    padding:12px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand-logo{
    width:36px; height:36px; border-radius:9px;
    background:var(--primary);
    color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:16px;
  }
  .brand-text h1{ font-size:16px; margin:0; }
  .brand-text .sub{ font-size:11.5px; color:var(--muted); }

  .tabs{ display:flex; gap:6px; }
  .tab-btn{
    padding:9px 16px;
    border-radius:8px;
    border:1px solid var(--border);
    background:#fff;
    font-size:13px;
    font-weight:600;
    color:var(--muted);
    cursor:pointer;
  }
  .tab-btn.active{
    background:var(--primary);
    border-color:var(--primary);
    color:#fff;
  }

  .clock{ font-size:12.5px; color:var(--muted); text-align:right; }

  /* ---------- Views ---------- */
  .view{ display:none; flex:1; min-height:0; }
  .view.active{ display:flex; }

  /* ===== KASIR VIEW ===== */
  #view-kasir{ overflow:hidden; }
  .catalog{
    flex:1;
    padding:16px 20px;
    overflow-y:auto;
  }
  .cat-tabs{
    display:flex;
    gap:8px;
    margin-bottom:14px;
    flex-wrap:wrap;
  }
  .cat-chip{
    padding:6px 14px;
    border-radius:20px;
    border:1px solid var(--border);
    background:#fff;
    font-size:12.5px;
    color:var(--muted);
    cursor:pointer;
  }
  .cat-chip.active{ background:var(--ink); color:#fff; border-color:var(--ink); }

  .search-row{ margin-bottom:14px; }
  .search-row input{
    width:100%;
    padding:10px 14px;
    border:1px solid var(--border);
    border-radius:10px;
    font-size:13.5px;
  }

  .product-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(140px, 1fr));
    gap:12px;
  }
  .product-card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:14px 12px;
    cursor:pointer;
    transition:transform .12s, border-color .12s;
    text-align:left;
  }
  .product-card:hover{ transform:translateY(-2px); border-color:var(--primary); }
  .product-card:active{ transform:translateY(0); }
  .product-emoji{ font-size:26px; margin-bottom:8px; }
  .product-name{ font-size:13.5px; font-weight:600; line-height:1.3; margin-bottom:6px; min-height:34px; }
  .product-price{ font-size:13px; color:var(--primary); font-weight:700; }
  .product-stock{ font-size:11px; color:var(--muted); margin-top:4px; }
  .product-stock.low{ color:var(--red); font-weight:600; }

  .empty-catalog{
    text-align:center; color:var(--muted); padding:60px 20px; font-size:14px;
  }

  /* Cart panel */
  .cart-panel{
    width:360px;
    background:var(--panel);
    border-left:1px solid var(--border);
    display:flex;
    flex-direction:column;
  }
  .cart-header{
    padding:16px 18px 12px;
    border-bottom:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .cart-header h2{ font-size:15px; margin:0; }
  .cart-clear{
    font-size:12px; color:var(--red); cursor:pointer; background:none; border:none;
  }
  .cart-items{
    flex:1;
    overflow-y:auto;
    padding:10px 14px;
  }
  .cart-empty{
    text-align:center; color:var(--muted); padding:40px 20px; font-size:13.5px;
  }
  .cart-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 6px;
    border-bottom:1px solid var(--border);
  }
  .cart-item-info{ flex:1; min-width:0; }
  .cart-item-name{ font-size:13px; font-weight:600; }
  .cart-item-price{ font-size:11.5px; color:var(--muted); }
  .qty-control{
    display:flex; align-items:center; gap:6px;
  }
  .qty-btn{
    width:24px; height:24px; border-radius:6px;
    border:1px solid var(--border);
    background:#fff;
    cursor:pointer;
    font-size:14px;
    display:flex; align-items:center; justify-content:center;
    color:var(--ink);
  }
  .qty-val{ font-size:13px; font-weight:600; min-width:18px; text-align:center; }
  .cart-item-total{ font-size:13px; font-weight:700; min-width:70px; text-align:right; }
  .remove-btn{
    background:none; border:none; color:var(--red); cursor:pointer; font-size:14px; padding:2px;
  }

  .cart-summary{
    padding:14px 18px;
    border-top:1px solid var(--border);
  }
  .summary-row{
    display:flex; justify-content:space-between;
    font-size:13px; margin-bottom:6px; color:var(--muted);
  }
  .summary-row.total{
    font-size:17px; font-weight:700; color:var(--ink);
    margin-top:8px; padding-top:8px; border-top:1px dashed var(--border);
  }
  .btn-checkout{
    width:100%;
    margin-top:12px;
    padding:13px;
    background:var(--primary);
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:14.5px;
    font-weight:700;
    cursor:pointer;
  }
  .btn-checkout:disabled{ background:var(--border); color:var(--muted); cursor:not-allowed; }

  /* ===== PRODUK VIEW ===== */
  #view-produk{ padding:20px; overflow-y:auto; flex-direction:column; }
  .produk-toolbar{
    display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:10px;
  }
  .produk-toolbar h2{ margin:0; font-size:17px; }
  .btn{
    padding:9px 16px; border-radius:9px; border:none; font-size:13.5px; font-weight:600; cursor:pointer;
  }
  .btn-primary{ background:var(--primary); color:#fff; }
  .btn-ghost{ background:#fff; border:1px solid var(--border); color:var(--ink); }
  .btn-danger{ background:var(--red-soft); color:var(--red); border:none; }

  table{ width:100%; border-collapse:collapse; background:var(--panel); border-radius:var(--radius); overflow:hidden; }
  thead th{
    text-align:left; font-size:11.5px; text-transform:uppercase; color:var(--muted);
    padding:10px 14px; background:#fafbfc; border-bottom:1px solid var(--border);
  }
  tbody td{ padding:11px 14px; font-size:13.5px; border-bottom:1px solid var(--border); }
  tbody tr:last-child td{ border-bottom:none; }
  .row-actions{ display:flex; gap:6px; }
  .icon-btn{
    background:none; border:none; cursor:pointer; font-size:15px; color:var(--muted); padding:4px 6px; border-radius:6px;
  }
  .icon-btn:hover{ background:var(--bg); }

  /* Modal */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.4);
    display:none; align-items:center; justify-content:center; z-index:100;
  }
  .modal-overlay.show{ display:flex; }
  .modal{
    background:#fff; border-radius:14px; padding:22px; width:380px; max-width:92vw;
  }
  .modal h3{ margin:0 0 16px; font-size:16px; }
  .field{ margin-bottom:12px; }
  .field label{ display:block; font-size:12.5px; color:var(--muted); margin-bottom:5px; }
  .field input, .field select{
    width:100%; padding:9px 11px; border:1px solid var(--border); border-radius:8px; font-size:13.5px;
  }
  .modal-actions{ display:flex; gap:8px; justify-content:flex-end; margin-top:18px; }

  /* Checkout modal specific */
  .checkout-total{
    text-align:center; padding:16px; background:var(--primary-soft); border-radius:10px; margin-bottom:16px;
  }
  .checkout-total .label{ font-size:12px; color:var(--muted); }
  .checkout-total .amount{ font-size:26px; font-weight:800; color:var(--primary); }
  .quick-cash{ display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
  .quick-cash button{
    padding:6px 10px; border-radius:7px; border:1px solid var(--border); background:#fff; font-size:12px; cursor:pointer;
  }
  .change-display{
    margin-top:12px; padding:12px; border-radius:10px; text-align:center; font-weight:700; font-size:15px;
  }
  .change-display.ok{ background:var(--green-soft); color:var(--green); }
  .change-display.bad{ background:var(--red-soft); color:var(--red); }

  /* ===== RIWAYAT VIEW ===== */
  #view-riwayat{ padding:20px; overflow-y:auto; flex-direction:column; }
  .riwayat-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .riwayat-header h2{ margin:0; font-size:17px; }
  .trx-card{
    background:var(--panel); border:1px solid var(--border); border-radius:var(--radius);
    padding:14px 16px; margin-bottom:10px;
  }
  .trx-top{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
  .trx-id{ font-size:12px; color:var(--muted); }
  .trx-total{ font-size:15px; font-weight:700; }
  .trx-items{ font-size:12.5px; color:var(--muted); }
  .empty-state{ text-align:center; color:var(--muted); padding:60px 20px; font-size:14px; }

  /* Receipt (print) */
  #receipt{ display:none; }
  @media print{
    body *{ visibility:hidden; }
    #receipt, #receipt *{ visibility:visible; }
    #receipt{ display:block; position:absolute; top:0; left:0; width:280px; padding:10px; font-family:monospace; font-size:12px; }
  }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background:#d5d8dd; border-radius:4px; }
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="brand-logo">K</div>
      <div class="brand-text">
        <h1 id="storeName">Toko Saya</h1>
        <div class="sub">Aplikasi Kasir</div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" data-view="kasir" onclick="switchView('kasir', this)">🧾 Kasir</button>
      <button class="tab-btn" data-view="produk" onclick="switchView('produk', this)">📦 Produk</button>
      <button class="tab-btn" data-view="riwayat" onclick="switchView('riwayat', this)">📊 Riwayat</button>
    </div>
    <div class="clock" id="clock"></div>
  </div>

  <!-- ===== KASIR ===== -->
  <div class="view active" id="view-kasir">
    <div class="catalog">
      <div class="search-row">
        <input type="text" id="searchInput" placeholder="Cari produk..." oninput="renderCatalog()">
      </div>
      <div class="cat-tabs" id="catTabs"></div>
      <div class="product-grid" id="productGrid"></div>
    </div>

    <div class="cart-panel">
      <div class="cart-header">
        <h2>Keranjang</h2>
        <button class="cart-clear" onclick="clearCart()">Kosongkan</button>
      </div>
      <div class="cart-items" id="cartItems"></div>
      <div class="cart-summary">
        <div class="summary-row"><span>Subtotal</span><span id="sumSubtotal">Rp 0</span></div>
        <div class="summary-row total"><span>Total</span><span id="sumTotal">Rp 0</span></div>
        <button class="btn-checkout" id="btnCheckout" onclick="openCheckout()" disabled>Bayar</button>
      </div>
    </div>
  </div>

  <!-- ===== PRODUK ===== -->
  <div class="view" id="view-produk">
    <div class="produk-toolbar">
      <h2>Kelola Produk</h2>
      <button class="btn btn-primary" onclick="openProductModal()">+ Tambah Produk</button>
    </div>
    <table>
      <thead>
        <tr><th>Produk</th><th>Kategori</th><th>Harga</th><th>Stok</th><th></th></tr>
      </thead>
      <tbody id="productTableBody"></tbody>
    </table>
  </div>

  <!-- ===== RIWAYAT ===== -->
  <div class="view" id="view-riwayat">
    <div class="riwayat-header">
      <h2>Riwayat Transaksi</h2>
      <button class="btn btn-ghost" onclick="clearHistory()">Hapus Semua Riwayat</button>
    </div>
    <div id="historyList"></div>
  </div>
</div>

<!-- Product Modal -->
<div class="modal-overlay" id="productModalOverlay">
  <div class="modal">
    <h3 id="productModalTitle">Tambah Produk</h3>
    <input type="hidden" id="editProductId">
    <div class="field"><label>Nama Produk</label><input type="text" id="pName" placeholder="mis. Kopi Susu"></div>
    <div class="field"><label>Emoji/Ikon (opsional)</label><input type="text" id="pEmoji" placeholder="☕" maxlength="2"></div>
    <div class="field"><label>Kategori</label><input type="text" id="pCategory" placeholder="mis. Minuman"></div>
    <div class="field"><label>Harga (Rp)</label><input type="number" id="pPrice" placeholder="15000"></div>
    <div class="field"><label>Stok</label><input type="number" id="pStock" placeholder="20"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeProductModal()">Batal</button>
      <button class="btn btn-primary" onclick="saveProduct()">Simpan</button>
    </div>
  </div>
</div>

<!-- Checkout Modal -->
<div class="modal-overlay" id="checkoutModalOverlay">
  <div class="modal">
    <h3>Pembayaran</h3>
    <div class="checkout-total">
      <div class="label">Total Belanja</div>
      <div class="amount" id="checkoutTotalDisplay">Rp 0</div>
    </div>
    <div class="field">
      <label>Uang Diterima</label>
      <input type="number" id="cashInput" placeholder="0" oninput="calcChange()">
      <div class="quick-cash" id="quickCash"></div>
    </div>
    <div class="change-display" id="changeDisplay" style="display:none;"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeCheckout()">Batal</button>
      <button class="btn btn-primary" id="btnConfirmPay" onclick="confirmPayment()" disabled>Selesaikan & Cetak</button>
    </div>
  </div>
</div>

<!-- Printable receipt -->
<div id="receipt"></div>

<script>
  const PRODUCTS_KEY = 'kasir_products_v1';
  const HISTORY_KEY = 'kasir_history_v1';
  const STORE_KEY = 'kasir_store_name_v1';

  let products = JSON.parse(localStorage.getItem(PRODUCTS_KEY) || 'null') || defaultProducts();
  let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  let cart = []; // {id, name, price, qty}
  let activeCategory = 'Semua';
  let lastTransaction = null;

  function defaultProducts(){
    return [
      { id:'p1', name:'Kopi Hitam', emoji:'☕', category:'Minuman', price:10000, stock:30 },
      { id:'p2', name:'Kopi Susu', emoji:'☕', category:'Minuman', price:15000, stock:25 },
      { id:'p3', name:'Teh Manis', emoji:'🍵', category:'Minuman', price:8000, stock:40 },
      { id:'p4', name:'Nasi Goreng', emoji:'🍛', category:'Makanan', price:20000, stock:15 },
      { id:'p5', name:'Mie Goreng', emoji:'🍜', category:'Makanan', price:18000, stock:15 },
      { id:'p6', name:'Roti Bakar', emoji:'🍞', category:'Makanan', price:12000, stock:20 },
      { id:'p7', name:'Kerupuk', emoji:'🥠', category:'Snack', price:3000, stock:50 },
      { id:'p8', name:'Air Mineral', emoji:'💧', category:'Minuman', price:5000, stock:60 },
    ];
  }

  function saveProducts(){ localStorage.setItem(PRODUCTS_KEY, JSON.stringify(products)); }
  function saveHistory(){ localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); }

  function fmt(n){
    return 'Rp ' + Number(n).toLocaleString('id-ID');
  }

  /* ---------- View switching ---------- */
  function switchView(name, btn){
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.getElementById('view-'+name).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    if(name==='produk') renderProductTable();
    if(name==='riwayat') renderHistory();
  }

  /* ---------- Clock ---------- */
  function updateClock(){
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long', year:'numeric' }) + ' • ' + now.toLocaleTimeString('id-ID');
  }
  updateClock();
  setInterval(updateClock, 1000);

  /* ---------- Catalog ---------- */
  function getCategories(){
    const cats = Array.from(new Set(products.map(p=>p.category)));
    return ['Semua', ...cats];
  }

  function renderCatTabs(){
    const wrap = document.getElementById('catTabs');
    wrap.innerHTML = getCategories().map(c => `
      <div class="cat-chip ${c===activeCategory ? 'active':''}" onclick="setCategory('${c.replace(/'/g,"\\'")}')">${c}</div>
    `).join('');
  }

  function setCategory(c){
    activeCategory = c;
    renderCatTabs();
    renderCatalog();
  }

  function renderCatalog(){
    renderCatTabs();
    const grid = document.getElementById('productGrid');
    const search = document.getElementById('searchInput').value.toLowerCase();
    let list = products;
    if(activeCategory !== 'Semua') list = list.filter(p=>p.category===activeCategory);
    if(search) list = list.filter(p=>p.name.toLowerCase().includes(search));

    if(list.length===0){
      grid.innerHTML = '<div class="empty-catalog">Tidak ada produk ditemukan.</div>';
      return;
    }

    grid.innerHTML = list.map(p => `
      <div class="product-card" onclick="addToCart('${p.id}')">
        <div class="product-emoji">${p.emoji || '🛒'}</div>
        <div class="product-name">${escapeHtml(p.name)}</div>
        <div class="product-price">${fmt(p.price)}</div>
        <div class="product-stock ${p.stock <= 5 ? 'low' : ''}">Stok: ${p.stock}</div>
      </div>
    `).join('');
  }

  /* ---------- Cart ---------- */
  function addToCart(id){
    const product = products.find(p=>p.id===id);
    if(!product || product.stock <= 0) return;
    const existing = cart.find(c=>c.id===id);
    if(existing){
      if(existing.qty >= product.stock) return;
      existing.qty++;
    } else {
      cart.push({ id, name:product.name, price:product.price, qty:1 });
    }
    renderCart();
  }

  function changeQty(id, delta){
    const item = cart.find(c=>c.id===id);
    const product = products.find(p=>p.id===id);
    if(!item) return;
    item.qty += delta;
    if(item.qty <= 0){
      cart = cart.filter(c=>c.id!==id);
    } else if(product && item.qty > product.stock){
      item.qty = product.stock;
    }
    renderCart();
  }

  function removeFromCart(id){
    cart = cart.filter(c=>c.id!==id);
    renderCart();
  }

  function clearCart(){
    cart = [];
    renderCart();
  }

  function cartTotal(){
    return cart.reduce((sum, item) => sum + item.price * item.qty, 0);
  }

  function renderCart(){
    const wrap = document.getElementById('cartItems');
    if(cart.length===0){
      wrap.innerHTML = '<div class="cart-empty">Keranjang masih kosong.<br>Klik produk untuk menambahkan.</div>';
    } else {
      wrap.innerHTML = cart.map(item => `
        <div class="cart-item">
          <div class="cart-item-info">
            <div class="cart-item-name">${escapeHtml(item.name)}</div>
            <div class="cart-item-price">${fmt(item.price)}</div>
          </div>
          <div class="qty-control">
            <button class="qty-btn" onclick="changeQty('${item.id}', -1)">−</button>
            <span class="qty-val">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty('${item.id}', 1)">+</button>
          </div>
          <div class="cart-item-total">${fmt(item.price * item.qty)}</div>
          <button class="remove-btn" onclick="removeFromCart('${item.id}')">✕</button>
        </div>
      `).join('');
    }
    const total = cartTotal();
    document.getElementById('sumSubtotal').textContent = fmt(total);
    document.getElementById('sumTotal').textContent = fmt(total);
    document.getElementById('btnCheckout').disabled = cart.length===0;
  }

  /* ---------- Checkout ---------- */
  function openCheckout(){
    const total = cartTotal();
    document.getElementById('checkoutTotalDisplay').textContent = fmt(total);
    document.getElementById('cashInput').value = '';
    document.getElementById('changeDisplay').style.display = 'none';
    document.getElementById('btnConfirmPay').disabled = true;

    const quickAmounts = [total, Math.ceil(total/5000)*5000, Math.ceil(total/10000)*10000, Math.ceil(total/50000)*50000]
      .filter((v,i,arr)=> v>0 && arr.indexOf(v)===i)
      .slice(0,4);
    document.getElementById('quickCash').innerHTML = quickAmounts.map(v=>
      `<button onclick="setCash(${v})">${fmt(v)}</button>`
    ).join('');

    document.getElementById('checkoutModalOverlay').classList.add('show');
  }

  function setCash(v){
    document.getElementById('cashInput').value = v;
    calcChange();
  }

  function closeCheckout(){
    document.getElementById('checkoutModalOverlay').classList.remove('show');
  }

  function calcChange(){
    const total = cartTotal();
    const cash = Number(document.getElementById('cashInput').value) || 0;
    const display = document.getElementById('changeDisplay');
    const btn = document.getElementById('btnConfirmPay');
    if(cash <= 0){
      display.style.display = 'none';
      btn.disabled = true;
      return;
    }
    display.style.display = 'block';
    if(cash < total){
      display.className = 'change-display bad';
      display.textContent = 'Kurang: ' + fmt(total - cash);
      btn.disabled = true;
    } else {
      display.className = 'change-display ok';
      display.textContent = 'Kembalian: ' + fmt(cash - total);
      btn.disabled = false;
    }
  }

  function confirmPayment(){
    const total = cartTotal();
    const cash = Number(document.getElementById('cashInput').value) || 0;
    const change = cash - total;

    // reduce stock
    cart.forEach(item => {
      const product = products.find(p=>p.id===item.id);
      if(product) product.stock = Math.max(0, product.stock - item.qty);
    });
    saveProducts();

    const trx = {
      id: 'TRX' + Date.now(),
      date: new Date().toISOString(),
      items: cart.map(c=>({ name:c.name, qty:c.qty, price:c.price })),
      total, cash, change
    };
    history.unshift(trx);
    saveHistory();
    lastTransaction = trx;

    closeCheckout();
    printReceipt(trx);
    clearCart();
    renderCatalog();
  }

  function printReceipt(trx){
    const store = document.getElementById('storeName').textContent;
    const dateStr = new Date(trx.date).toLocaleString('id-ID');
    let html = `
      <div style="text-align:center; margin-bottom:8px;">
        <div style="font-weight:bold; font-size:14px;">${escapeHtml(store)}</div>
        <div>${dateStr}</div>
        <div>${trx.id}</div>
      </div>
      <div style="border-top:1px dashed #000; margin:6px 0;"></div>
    `;
    trx.items.forEach(it => {
      html += `<div style="display:flex; justify-content:space-between;">
        <span>${escapeHtml(it.name)} x${it.qty}</span>
        <span>${fmt(it.price * it.qty)}</span>
      </div>`;
    });
    html += `
      <div style="border-top:1px dashed #000; margin:6px 0;"></div>
      <div style="display:flex; justify-content:space-between; font-weight:bold;">
        <span>TOTAL</span><span>${fmt(trx.total)}</span>
      </div>
      <div style="display:flex; justify-content:space-between;">
        <span>Tunai</span><span>${fmt(trx.cash)}</span>
      </div>
      <div style="display:flex; justify-content:space-between;">
        <span>Kembali</span><span>${fmt(trx.change)}</span>
      </div>
      <div style="text-align:center; margin-top:10px;">Terima kasih!</div>
    `;
    document.getElementById('receipt').innerHTML = html;
    setTimeout(()=> window.print(), 150);
  }

  /* ---------- Product management ---------- */
  function renderProductTable(){
    const body = document.getElementById('productTableBody');
    if(products.length===0){
      body.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#999; padding:30px;">Belum ada produk.</td></tr>';
      return;
    }
    body.innerHTML = products.map(p => `
      <tr>
        <td>${p.emoji || ''} ${escapeHtml(p.name)}</td>
        <td>${escapeHtml(p.category)}</td>
        <td>${fmt(p.price)}</td>
        <td>${p.stock}</td>
        <td>
          <div class="row-actions">
            <button class="icon-btn" onclick="openProductModal('${p.id}')" title="Edit">✏️</button>
            <button class="icon-btn" onclick="deleteProduct('${p.id}')" title="Hapus">🗑️</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  function openProductModal(id){
    document.getElementById('editProductId').value = id || '';
    if(id){
      const p = products.find(x=>x.id===id);
      document.getElementById('productModalTitle').textContent = 'Edit Produk';
      document.getElementById('pName').value = p.name;
      document.getElementById('pEmoji').value = p.emoji || '';
      document.getElementById('pCategory').value = p.category;
      document.getElementById('pPrice').value = p.price;
      document.getElementById('pStock').value = p.stock;
    } else {
      document.getElementById('productModalTitle').textContent = 'Tambah Produk';
      document.getElementById('pName').value = '';
      document.getElementById('pEmoji').value = '';
      document.getElementById('pCategory').value = '';
      document.getElementById('pPrice').value = '';
      document.getElementById('pStock').value = '';
    }
    document.getElementById('productModalOverlay').classList.add('show');
  }

  function closeProductModal(){
    document.getElementById('productModalOverlay').classList.remove('show');
  }

  function saveProduct(){
    const id = document.getElementById('editProductId').value;
    const name = document.getElementById('pName').value.trim();
    const emoji = document.getElementById('pEmoji').value.trim();
    const category = document.getElementById('pCategory').value.trim() || 'Lainnya';
    const price = Number(document.getElementById('pPrice').value) || 0;
    const stock = Number(document.getElementById('pStock').value) || 0;

    if(!name){ document.getElementById('pName').focus(); return; }

    if(id){
      const p = products.find(x=>x.id===id);
      Object.assign(p, { name, emoji, category, price, stock });
    } else {
      products.push({ id:'p'+Date.now(), name, emoji, category, price, stock });
    }
    saveProducts();
    closeProductModal();
    renderProductTable();
    renderCatalog();
  }

  function deleteProduct(id){
    if(confirm('Hapus produk ini?')){
      products = products.filter(p=>p.id!==id);
      saveProducts();
      renderProductTable();
      renderCatalog();
    }
  }

  /* ---------- History ---------- */
  function renderHistory(){
    const wrap = document.getElementById('historyList');
    if(history.length===0){
      wrap.innerHTML = '<div class="empty-state">Belum ada transaksi.</div>';
      return;
    }
    wrap.innerHTML = history.map(trx => `
      <div class="trx-card">
        <div class="trx-top">
          <span class="trx-id">${trx.id} • ${new Date(trx.date).toLocaleString('id-ID')}</span>
          <span class="trx-total">${fmt(trx.total)}</span>
        </div>
        <div class="trx-items">${trx.items.map(i=>`${escapeHtml(i.name)} x${i.qty}`).join(', ')}</div>
      </div>
    `).join('');
  }

  function clearHistory(){
    if(confirm('Hapus semua riwayat transaksi? Tindakan ini tidak bisa dibatalkan.')){
      history = [];
      saveHistory();
      renderHistory();
    }
  }

  /* ---------- Utils ---------- */
  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  /* ---------- Init ---------- */
  renderCatalog();
  renderCart();
</script>

</body>
</html>
